name: Terraform Configuration Drift Detection

on:
  workflow_dispatch:
    inputs:
      stack_path:
        description: "Terraform stack path relative to repo root"
        required: false
        default: "azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api"
      backend_config_path:
        description: "Backend config file relative to repo root"
        required: false
        default: "azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api/backend.hcl"
      var_file:
        description: "Optional tfvars file relative to the stack path"
        required: false
        default: ""
      environment_name:
        description: "GitHub Environment holding OIDC Azure configuration"
        required: false
        default: "dev"
  schedule:
    - cron: "41 3 * * *"

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  terraform-plan:
    name: Terraform Drift Plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name || 'dev' }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      ARM_SKIP_PROVIDER_REGISTRATION: true
      STACK_PATH: ${{ inputs.stack_path || 'azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api' }}
      BACKEND_CONFIG_PATH: ${{ inputs.backend_config_path || 'azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api/backend.hcl' }}
      VAR_FILE: ${{ inputs.var_file || '' }}
    outputs:
      tfplanExitCode: ${{ steps.tf-plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate OIDC Configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "${ARM_CLIENT_ID}" || { echo "::error::Missing AZURE_CLIENT_ID. Configure it as a GitHub Environment or repository variable/secret."; exit 1; }
          test -n "${ARM_TENANT_ID}" || { echo "::error::Missing AZURE_TENANT_ID. Configure it as a GitHub Environment or repository variable/secret."; exit 1; }
          test -n "${ARM_SUBSCRIPTION_ID}" || { echo "::error::Missing AZURE_SUBSCRIPTION_ID. Configure it as a GitHub Environment or repository variable/secret."; exit 1; }

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Terraform Init
        working-directory: ${{ env.STACK_PATH }}
        run: terraform init -backend-config="${{ github.workspace }}/${{ env.BACKEND_CONFIG_PATH }}"

      - name: Terraform Plan
        id: tf-plan
        working-directory: ${{ env.STACK_PATH }}
        run: |
          export exitcode=0
          if [ -n "${VAR_FILE}" ]; then
            terraform plan -detailed-exitcode -no-color -out tfplan -var-file="${VAR_FILE}" || export exitcode=$?
          else
            terraform plan -detailed-exitcode -no-color -out tfplan || export exitcode=$?
          fi

          echo "exitcode=${exitcode}" >> "$GITHUB_OUTPUT"

          if [ "${exitcode}" -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi

      - name: Publish Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ env.STACK_PATH }}/tfplan

      - name: Create String Output
        id: tf-plan-string
        working-directory: ${{ env.STACK_PATH }}
        run: |
          TERRAFORM_PLAN=$(terraform show -no-color tfplan)

          delimiter="$(openssl rand -hex 8)"
          echo "summary<<${delimiter}" >> "$GITHUB_OUTPUT"
          echo "## Terraform Plan Output" >> "$GITHUB_OUTPUT"
          echo "<details><summary>${STACK_PATH}</summary>" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo '```terraform' >> "$GITHUB_OUTPUT"
          echo "$TERRAFORM_PLAN" >> "$GITHUB_OUTPUT"
          echo '```' >> "$GITHUB_OUTPUT"
          echo "</details>" >> "$GITHUB_OUTPUT"
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      - name: Publish Terraform Plan to Task Summary
        env:
          SUMMARY: ${{ steps.tf-plan-string.outputs.summary }}
        run: echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Drift Report
        if: steps.tf-plan.outputs.exitcode == 2
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.tf-plan-string.outputs.summary }}
          STACK_PATH: ${{ env.STACK_PATH }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `Terraform Drift Detected: ${process.env.STACK_PATH}`;
            const body = `${process.env.SUMMARY}`;
            const creator = 'github-actions[bot]';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator,
              per_page: 100,
            });

            const match = issues.data.find((issue) => issue.title === title);

            if (match) {
              if (match.body !== body) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: match.number,
                  body,
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Close Drift Report
        if: steps.tf-plan.outputs.exitcode == 0
        uses: actions/github-script@v7
        env:
          STACK_PATH: ${{ env.STACK_PATH }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `Terraform Drift Detected: ${process.env.STACK_PATH}`;
            const creator = 'github-actions[bot]';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator,
              per_page: 100,
            });

            const match = issues.data.find((issue) => issue.title === title);
            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                state: 'closed',
              });
            }

      - name: Error on Drift
        if: steps.tf-plan.outputs.exitcode == 2
        run: exit 1
