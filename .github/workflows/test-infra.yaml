name: Legacy Terraform Test

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Legacy root stack to run"
        type: choice
        required: true
        default: platform
        options:
          - platform
          - workloads
          - resource_grouping
          - all
      action:
        description: "Terraform action to run"
        type: choice
        required: true
        default: plan
        options:
          - plan
          - apply
      lock_timeout:
        description: "Terraform lock timeout"
        required: false
        default: "5m"

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}

jobs:
  legacy-terraform:
    runs-on: ubuntu-latest
    concurrency:
      group: legacy-terraform-${{ inputs.target }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Run Legacy Terraform
        shell: bash
        run: |
          set -euo pipefail

          run_stack() {
            local name="$1"
            local stack_path="$2"
            local var_file="$3"

            echo "Running ${name} in ${stack_path}"

            terraform -chdir="${stack_path}" init -upgrade
            terraform -chdir="${stack_path}" validate
            terraform -chdir="${stack_path}" plan \
              -lock-timeout="${{ inputs.lock_timeout }}" \
              -out=tfplan \
              -var-file="${var_file}"

            if [ "${{ inputs.action }}" = "apply" ]; then
              terraform -chdir="${stack_path}" apply \
                -lock-timeout="${{ inputs.lock_timeout }}" \
                -auto-approve tfplan
            fi
          }

          case "${{ inputs.target }}" in
            platform)
              run_stack \
                "legacy-platform" \
                "azure-enterprise-terraform/terraform/stacks/dev/platform" \
                "dev.tfvars"
              ;;
            workloads)
              run_stack \
                "legacy-workloads" \
                "azure-enterprise-terraform/terraform/stacks/dev/workloads" \
                "dev.tfvars"
              ;;
            resource_grouping)
              run_stack \
                "legacy-resource-grouping" \
                "azure-enterprise-terraform/terraform/global/resource_grouping" \
                "dev.auto.tfvars"
              ;;
            all)
              run_stack \
                "legacy-platform" \
                "azure-enterprise-terraform/terraform/stacks/dev/platform" \
                "dev.tfvars"
              run_stack \
                "legacy-resource-grouping" \
                "azure-enterprise-terraform/terraform/global/resource_grouping" \
                "dev.auto.tfvars"
              run_stack \
                "legacy-workloads" \
                "azure-enterprise-terraform/terraform/stacks/dev/workloads" \
                "dev.tfvars"
              ;;
            *)
              echo "Unsupported target: ${{ inputs.target }}" >&2
              exit 1
              ;;
          esac

      - name: Upload Plan Artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-tfplan-${{ github.run_id }}
          path: |
            azure-enterprise-terraform/terraform/stacks/dev/platform/tfplan
            azure-enterprise-terraform/terraform/stacks/dev/workloads/tfplan
            azure-enterprise-terraform/terraform/global/resource_grouping/tfplan
          if-no-files-found: ignore
