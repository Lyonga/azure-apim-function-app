name: Terraform Plan and Apply

on:
  workflow_dispatch:
    inputs:
      stack_path:
        description: "Terraform stack path relative to repo root"
        required: true
        default: "azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api"
      backend_config_path:
        description: "Backend config file relative to repo root"
        required: true
        default: "azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api/backend.hcl"
      var_file:
        description: "Optional tfvars file relative to the stack path"
        required: false
        default: ""
      apply:
        description: "Apply the reviewed plan"
        type: boolean
        required: false
        default: false
      environment_name:
        description: "GitHub Environment holding OIDC Azure configuration"
        required: false
        default: "dev"

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}
    concurrency:
      group: terraform-${{ inputs.stack_path }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate OIDC Configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "${ARM_CLIENT_ID}" || { echo "::error::Missing client ID. Configure AZURE_CLIENT_ID or ARM_CLIENT_ID in GitHub variables/secrets."; exit 1; }
          test -n "${ARM_TENANT_ID}" || { echo "::error::Missing tenant ID. Configure AZURE_TENANT_ID or ARM_TENANT_ID in GitHub variables/secrets."; exit 1; }
          test -n "${ARM_SUBSCRIPTION_ID}" || { echo "::error::Missing subscription ID. Configure AZURE_SUBSCRIPTION_ID or ARM_SUBSCRIPTION_ID in GitHub variables/secrets."; exit 1; }

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Resolve Terraform Inputs
        id: resolve-inputs
        shell: bash
        run: |
          set -euo pipefail

          stack_dir="${GITHUB_WORKSPACE}/${{ inputs.stack_path }}"
          backend_path="${GITHUB_WORKSPACE}/${{ inputs.backend_config_path }}"

          if [ -f "${backend_path}" ]; then
            resolved_backend="${backend_path}"
          elif [ -f "${backend_path}.example" ]; then
            resolved_backend="${backend_path}.example"
          else
            echo "::error::Backend config file not found: ${backend_path} or ${backend_path}.example"
            exit 1
          fi

          if [ -n "${{ inputs.var_file }}" ]; then
            candidate_var_file="${{ inputs.var_file }}"
          elif [ -f "${stack_dir}/dev.tfvars" ]; then
            candidate_var_file="dev.tfvars"
          elif [ -f "${stack_dir}/dev.tfvars.example" ]; then
            candidate_var_file="dev.tfvars.example"
          else
            candidate_var_file=""
          fi

          if [ -n "${candidate_var_file}" ] && [ ! -f "${stack_dir}/${candidate_var_file}" ]; then
            echo "::error::Var file not found: ${stack_dir}/${candidate_var_file}"
            exit 1
          fi

          echo "backend_config=${resolved_backend}" >> "${GITHUB_OUTPUT}"
          echo "var_file=${candidate_var_file}" >> "${GITHUB_OUTPUT}"

      - name: Terraform Init
        working-directory: ${{ inputs.stack_path }}
        run: terraform init -backend-config="${{ steps.resolve-inputs.outputs.backend_config }}"

      - name: Terraform Format
        working-directory: ${{ inputs.stack_path }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ inputs.stack_path }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ inputs.stack_path }}
        run: |
          set -euo pipefail
          if [ -n "${{ steps.resolve-inputs.outputs.var_file }}" ]; then
            terraform plan -out=tfplan -var-file="${{ steps.resolve-inputs.outputs.var_file }}"
          else
            terraform plan -out=tfplan
          fi

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ inputs.stack_path }}/tfplan

      # - name: Terraform Apply
      #   if: ${{ inputs.apply == true }}
      #   working-directory: ${{ inputs.stack_path }}
      #   run: terraform apply -auto-approve tfplan
