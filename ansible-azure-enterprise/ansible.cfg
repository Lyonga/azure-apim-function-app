[defaults]
inventory = ./inventories/dev/azure_rm.yml
roles_path = ./roles
collections_paths = ./collections
host_key_checking = True
retry_files_enabled = False
stdout_callback = yaml
bin_ansible_callbacks = True
forks = 20
timeout = 30
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ./.fact_cache
fact_caching_timeout = 86400
callbacks_enabled = profile_tasks,timer
interpreter_python = auto_silent
vault_identity_list = dev@~/.ansible/dev.vault.pass,qa@~/.ansible/qa.vault.pass,prod@~/.ansible/prod.vault.pass

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml, azure.azcollection.azure_rm

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o StrictHostKeyChecking=yes
