---
- name: Install baseline Windows packages
  chocolatey.chocolatey.win_chocolatey:
    name: "{{ item.name }}"
    state: present
  loop: "{{ windows_baseline_packages }}"

- name: Ensure Windows Time service is running
  ansible.windows.win_service:
    name: W32Time
    start_mode: auto
    state: started

- name: Enable PowerShell remoting
  ansible.windows.win_shell: |
    Enable-PSRemoting -Force
  changed_when: false

- name: Ensure SNMP service state if required
  ansible.windows.win_service:
    name: SNMP
    start_mode: auto
    state: started
  when: windows_snmp_service_required
