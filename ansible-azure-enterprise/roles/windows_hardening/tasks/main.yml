---
- name: Disable RDP unless explicitly allowed
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server
    name: fDenyTSConnections
    data: "{{ 0 if windows_enable_rdp else 1 }}"
    type: dword

- name: Enable Domain firewall profile
  community.windows.win_firewall:
    profiles: [Domain]
    state: enabled

- name: Enable Private firewall profile
  community.windows.win_firewall:
    profiles: [Private]
    state: enabled

- name: Enable Public firewall profile
  community.windows.win_firewall:
    profiles: [Public]
    state: enabled

- name: Enable PowerShell script block logging
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging
    name: EnableScriptBlockLogging
    data: 1
    type: dword

- name: Set Security event log size
  ansible.windows.win_shell: |
    wevtutil sl Security /rt:true
    wevtutil sl Security /ms:{{ windows_security_log_max_size_mb * 1024 * 1024 }}
  changed_when: false

- name: Disable Windows consumer experiences
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CloudContent
    name: DisableWindowsConsumerFeatures
    data: 1
    type: dword
  when: windows_disable_consumer_experiences
